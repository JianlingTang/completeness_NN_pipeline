# Optional: publish to PyPI when a GitHub Release is created.
# 1. On PyPI: Account → Publishing → Add trusted publisher (owner/repo, workflow "publish", branch optional).
# 2. Create a release (tag e.g. v0.1.0) to trigger this.
name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build
        run: |
          python -m pip install build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          verbose: true
